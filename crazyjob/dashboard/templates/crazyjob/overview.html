{% extends "crazyjob/base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Dashboard Overview</h1>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    {% for status, count in stats.counts.items() %}
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500 uppercase">{{ status }}</div>
        <div class="text-3xl font-bold">{{ count }}</div>
    </div>
    {% endfor %}
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500 uppercase">Throughput</div>
        <div class="text-2xl font-bold">{{ stats.throughput }} jobs/min</div>
    </div>
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500 uppercase">Error Rate (1h)</div>
        <div class="text-2xl font-bold">{{ stats.error_rate }}%</div>
    </div>
</div>
{% endblock %}
