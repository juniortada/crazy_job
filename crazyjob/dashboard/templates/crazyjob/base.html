<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyJob Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-600 text-white p-4">
        <div class="container mx-auto flex items-center justify-between">
            <a href="{{ base_url }}" class="text-xl font-bold">CrazyJob</a>
            <div class="space-x-4 text-sm">
                <a href="{{ base_url }}" class="hover:underline">Overview</a>
                <a href="{{ base_url }}queues" class="hover:underline">Enqueued</a>
                <a href="{{ base_url }}active" class="hover:underline">Active</a>
                <a href="{{ base_url }}scheduled" class="hover:underline">Scheduled</a>
                <a href="{{ base_url }}retrying" class="hover:underline">Retrying</a>
                <a href="{{ base_url }}completed" class="hover:underline">Completed</a>
                <a href="{{ base_url }}failed" class="hover:underline">Failed</a>
                <a href="{{ base_url }}dead" class="hover:underline">Dead</a>
                <a href="{{ base_url }}workers" class="hover:underline">Workers</a>
                <a href="{{ base_url }}schedules" class="hover:underline">Schedules</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        {% if flash_messages %}
            {% for category, message in flash_messages %}
                <div class="mb-4 p-3 rounded {{ 'bg-green-100 text-green-800' if category == 'success' else 'bg-red-100 text-red-800' }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
